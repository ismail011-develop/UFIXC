<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFIX — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1f1f1f;
  --border:#2a2a2a;
  --yellow:#f5c800;
  --yellow2:#ffd93d;
  --green:#00e676;
  --red:#ff4444;
  --text:#f0f0f0;
  --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* GRID BACKGROUND */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(245,200,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,200,0,.04) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
.bg-glow{
  position:fixed;
  top:-200px;left:50%;
  transform:translateX(-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse, rgba(245,200,0,.10) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
  animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:.7;transform:translateX(-50%) scale(1);}
  50%{opacity:1;transform:translateX(-50%) scale(1.08);}
}

/* NAV */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;
  border-bottom:3px solid var(--yellow);
  background:var(--bg);
  position:relative;z-index:10;
}
.nav-logo img{height:52px}
.nav-logo-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:34px;color:var(--yellow);letter-spacing:3px;
}
.nav-clock{
  font-family:'DM Mono',monospace;
  font-size:32px;color:var(--yellow);letter-spacing:2px;
}
.nav-date{
  font-family:'DM Mono',monospace;
  font-size:13px;color:var(--muted);
  text-align:right;letter-spacing:1px;text-transform:uppercase;
}

/* LOGIN WRAP */
.login-outer{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:5;padding:32px 16px;
}

.login-box{
  width:100%;max-width:440px;
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.6), 0 0 0 1px rgba(245,200,0,.06);
  animation:boxIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes boxIn{
  from{opacity:0;transform:translateY(32px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* BOX HEADER */
.login-header{
  background:var(--surface2);
  border-bottom:2px solid var(--border);
  padding:32px 36px 28px;
  text-align:center;
  position:relative;
}
.login-header::after{
  content:'';
  position:absolute;bottom:-2px;left:50%;
  transform:translateX(-50%);
  width:80px;height:3px;
  background:var(--yellow);
  border-radius:2px;
}
.login-icon{
  width:64px;height:64px;
  background:rgba(245,200,0,.1);
  border:2px solid rgba(245,200,0,.25);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  font-size:28px;
}
.login-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:38px;letter-spacing:4px;
  color:var(--yellow);
  line-height:1;
}
.login-sub{
  font-family:'DM Mono',monospace;
  font-size:12px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  margin-top:6px;
}

/* FORM */
.login-form{padding:32px 36px;}

.field{margin-bottom:20px;}
.field-label{
  font-size:12px;font-weight:800;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;display:block;
}
.field-wrap{position:relative;}
.field-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:17px;pointer-events:none;opacity:.5;
}
.field input{
  width:100%;
  padding:16px 16px 16px 46px;
  background:var(--surface2);
  border:2px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-size:17px;font-weight:600;
  transition:border-color .2s, box-shadow .2s;
  outline:none;
  letter-spacing:.5px;
}
.field input::placeholder{color:var(--muted);font-weight:400;}
.field input:focus{
  border-color:var(--yellow);
  box-shadow:0 0 0 3px rgba(245,200,0,.12);
}
.field input.error{
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(255,68,68,.12);
  animation:shake .35s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

/* SHOW PASSWORD */
.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:19px;color:var(--muted);
  transition:color .2s;padding:4px;
}
.eye-btn:hover{color:var(--yellow);}

/* ERROR MSG */
.err-msg{
  display:none;
  background:rgba(255,68,68,.08);
  border:1.5px solid rgba(255,68,68,.3);
  border-radius:10px;
  padding:12px 16px;
  color:var(--red);
  font-size:14px;font-weight:700;
  margin-bottom:20px;
  align-items:center;gap:8px;
}
.err-msg.show{display:flex;}

/* SUBMIT BTN */
.btn-login{
  width:100%;
  padding:18px;
  background:var(--yellow);
  border:none;
  border-radius:12px;
  color:#000;
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;letter-spacing:4px;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
  margin-top:4px;
}
.btn-login::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .2s;
}
.btn-login:hover::before{background:rgba(255,255,255,.1);}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,0,.25);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.spinner{
  display:inline-block;
  width:20px;height:20px;
  border:2.5px solid rgba(0,0,0,.25);
  border-top-color:#000;
  border-radius:50%;
  animation:spin .6s linear infinite;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.login-footer{
  padding:16px 36px 24px;
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--muted);
  letter-spacing:1px;
  border-top:1px solid var(--border);
}
.login-footer span{color:var(--yellow);}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <img src="ufix_logo.png" alt="UFIX"
      onerror="this.style.display='none';document.querySelector('.nav-logo-text').style.display='block'">
    <span class="nav-logo-text" style="display:none">UFIX</span>
  </div>
  <div style="text-align:right">
    <div class="nav-clock" id="clock">00:00:00</div>
    <div class="nav-date" id="navDate">—</div>
  </div>
</nav>

<!-- LOGIN -->
<div class="login-outer">
  <div class="login-box">

    <div class="login-header">
      <div class="login-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="login-title">SIGN IN</div>
      <div class="login-sub">UFIX Attendance System</div>
    </div>

    <div class="login-form">

      <div class="err-msg" id="errMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="errText">Invalid username or password</span>
      </div>

      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
          <button class="eye-btn" onclick="toggleEye()" id="eyeBtn" title="Show/hide password">
            <svg id="eyeIcon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="login()">LOGIN</button>
    </div>

    <div class="login-footer">
      UFIX HR · Attendance Portal · <span>v2.0</span>
    </div>

  </div>
</div>

<script>
// ── CREDENTIALS (from db.json logic) ──────
// In a real setup these would be fetched from db.json on a server.
// Since this is a static GitHub Pages site, credentials are stored here.
const DB = {
  username: "ufix710@gmail.com",
  password: "yusuf1414ufixhr"
};

// ── CLOCK ─────────────────────────────────
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  document.getElementById('navDate').textContent=DAYS[n.getDay()]+' · '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();
}
setInterval(updateClock,1000); updateClock();

// ── EYE TOGGLE ────────────────────────────
function toggleEye(){
  const inp=document.getElementById('password');
  const icon=document.getElementById('eyeIcon');
  if(inp.type==='password'){
    inp.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ── LOGIN ─────────────────────────────────
function login(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('errMsg');

  // Clear previous errors
  err.classList.remove('show');
  document.getElementById('username').classList.remove('error');
  document.getElementById('password').classList.remove('error');

  if(!u||!p){
    document.getElementById('errText').textContent='Please fill in all fields';
    err.classList.add('show');
    if(!u) document.getElementById('username').classList.add('error');
    if(!p) document.getElementById('password').classList.add('error');
    return;
  }

  // Loading state
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>';

  // Simulate short check delay (feels more real)
  setTimeout(()=>{
    if(u===DB.username && p===DB.password){
      // SUCCESS — set session and redirect
      sessionStorage.setItem('ufix_auth','1');
      btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> SUCCESS';
      btn.style.background='var(--green)';
      setTimeout(()=>{
        window.location.href='index.html';
      },700);
    } else {
      // FAIL
      btn.disabled=false;
      btn.innerHTML='LOGIN';
      document.getElementById('errText').textContent='Invalid username or password';
      err.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      document.getElementById('password').value='';
      document.getElementById('password').focus();
    }
  },600);
}

// ── AUTO-FOCUS ────────────────────────────
window.onload=()=>document.getElementById('username').focus();
</script>
</body>
</html>
